<div class="add-place-modal">
  <div class="add-place-modal-header">
    <div class="add-place-modal-title">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#2d5a27" stroke-width="2">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
      <span>Add to {{ data.destinationName }}</span>
      <span class="add-place-tab-label">{{ data.activeTab | titlecase }} tab</span>
    </div>
    <button class="add-place-close" (click)="cancel()">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="add-place-modal-body">
    <!-- Google Places search -->
    <p class="add-place-section-label">Search Google Places</p>
    <div class="add-place-search-wrap">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#aaa" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input
        type="text"
        class="add-place-search-input"
        [value]="addPlaceSearch"
        placeholder="Search for a place..."
        (input)="onSearchInput($event)"
        (blur)="onBlur()"
        autocomplete="off">
    </div>

    <!-- Search results -->
    <div class="add-place-results" *ngIf="addPlacePredictions.length > 0">
      <div class="add-place-result-item" *ngFor="let p of addPlacePredictions" (mousedown)="selectPrediction(p)">
        <div class="add-place-result-thumb">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#aaa" stroke-width="1.8">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18M9 21V9"/>
          </svg>
        </div>
        <div class="add-place-result-info">
          <span class="add-place-result-main">{{ p.structured_formatting.main_text }}</span>
          <span class="add-place-result-sub">
            <span *ngIf="p.rating">⭐ {{ p.rating }} · </span>{{ p.structured_formatting.secondary_text }}
          </span>
        </div>
        <button class="add-place-result-btn">+ Add</button>
      </div>
    </div>

    <p class="add-place-or">or add manually</p>

    <!-- Manual entry -->
    <div class="add-place-field">
      <label>Place name</label>
      <input type="text" [(ngModel)]="addPlaceCustomName" placeholder="Custom place...">
    </div>
    <div class="add-place-field">
      <label>Notes (optional)</label>
      <textarea [(ngModel)]="addPlaceNotes" placeholder="e.g. Book tickets in advance, opens at 8am..." rows="3"></textarea>
    </div>
  </div>

  <div class="add-place-modal-footer">
    <button class="dialog-cancel" (click)="cancel()">Cancel</button>
    <button class="dialog-confirm" (click)="confirm()" [disabled]="!addPlaceCustomName && !addPlaceSearch">
      Add to {{ data.destinationName }}
    </button>
  </div>
</div>
