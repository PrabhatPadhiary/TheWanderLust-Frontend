<div class="confirm-dialog">
  <h4>Remove Destination</h4>
  <p class="dialog-hint">Are you sure you want to remove <strong>{{ data.destinationName }}</strong> from your trip?</p>
  <div class="dialog-actions">
    <button class="dialog-cancel" (click)="cancel()">Cancel</button>
    <button class="dialog-confirm dialog-confirm--danger" (click)="confirm()">Remove</button>
  </div>
</div>
